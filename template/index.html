<meta charset="UTF-8">
<title>{{title}}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 10px;
    font-family: 'Avenir','Helvetica Neue','Helvetica','Arial', 'ヒラギノ角ゴ Pro W3', 'Hiragino Kaku Gothic Pro','メイリオ', 'Meiryo', '游ゴシック', 'Yu Gothic', 'ＭＳ Ｐゴシック', sans-serif;
}
.wrapper {
    display:grid;
    grid-template-rows: fit-content(400px) auto;
    grid-template-columns: fit-content(400px) auto;
    height: 100%;
    grid-template-areas:
        "sd hd"
        "sd bd"
        "sd bd";

    row-gap: 5px;
    column-gap: 5px;

    margin-left: auto;
    margin-right: auto;
    max-width: 94.625em;
    min-width: 26.25em;
}

@media(max-width: 520px){
  .wrapper {
    grid-template-columns: 1fr;
    grid-template-rows: fit-content(100px) auto;
    grid-template-areas:
        "hd"
        "bd"
        "sd";
  }
}

.header {
  background-color: rgb(168, 191, 211);
  grid-area: hd;
  text-align: center;
}

.header h1 {
  margin: 2px;
  font-size: 20px;
}
.sidebar {
  grid-area: sd;
  background-color: rgb(168, 224, 241);
  /*max-width: 15em;*/
}
.footer {
  background-color: rgb(109, 116, 123);
}
.body {
  grid-area: bd;
  background-color: aliceblue;
  line-height: 1.6;
}

.body th,td {
    border: solid 1px;
}

.body table {
  border-collapse:  collapse;
}

.sidebar {
  padding-top: 10px;
}
.sidebar ul {
  margin-left: -10px;
  margin-right: 20px;
}

.sidebar-title {
  text-align: center;
}

</style>
<div class="wrapper">
    <div class="header"><h1>サトイモ科園芸図鑑</h1></div>
    <div class="sidebar">
      <div class="sidebar-title"><span>メニュー<span></div>
      {{sidemenu | safe}}
    </div>
    <article class="body">
      <h1>{{title}}</h1>
      {{article | safe}}
    </article>
</div>
